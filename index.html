<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/isthishenry_logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Henry Allan's design portfolio." />
    
    <!-- Open Graph / Link Preview -->
    <meta property="og:title" content="isthishenry" />
    <meta property="og:description" content="Henry Allan's design portfolio." />
    <meta property="og:image" content="https://isthishenry-99ba6.web.app/preview.png" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="isthishenry" />
    <meta name="twitter:description" content="Henry Allan's design portfolio." />
    <meta name="twitter:image" content="https://isthishenry-99ba6.web.app/preview.png" />
    
    <!-- Preload critical fonts -->
    <link rel="preload" href="/font/Inter-Regular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="/font/Inter_Bold.ttf" as="font" type="font/ttf" crossorigin>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
      
      /* Define Inter font faces early */
      @font-face {
        font-family: 'Inter';
        src: url('/font/Inter-Regular.ttf') format('truetype');
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Inter';
        src: url('/font/Inter_Bold.ttf') format('truetype');
        font-weight: 700;
        font-display: swap;
      }
      /* Legacy alias */
      @font-face {
        font-family: 'Inter Bold';
        src: url('/font/Inter_Bold.ttf') format('truetype');
        font-weight: 700;
        font-display: swap;
      }
    </style>
    
    <!-- Preconnect to R2 CDN for faster asset loading -->
    <link rel="preconnect" href="https://cdn.isthishenry.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.isthishenry.com">
    
    <title>isthishenry</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
